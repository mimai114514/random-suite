name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-desktop:
    name: Build random-desktop (Flutter)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
      - name: Get dependencies
        working-directory: random-desktop
        run: flutter pub get
      - name: Build Windows
        working-directory: random-desktop
        run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-build
          path: random-desktop/build/windows/x64/runner/Release/

  build-floating:
    name: Build random-floating (.NET)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        working-directory: random-floating
        run: dotnet restore
      - name: Publish
        working-directory: random-floating
        run: dotnet publish Random_FloatingTool/Random_FloatingTool.csproj -c Release --no-restore
      - uses: actions/upload-artifact@v4
        with:
          name: floating-build
          path: random-floating/Random_FloatingTool/bin/Release/net8.0-windows10.0.19041.0/publish/

  build-installer:
    name: Build Installer (Inno Setup)
    needs: [build-desktop, build-floating]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: desktop-build
          path: random-desktop/build/windows/x64/runner/Release/
      - uses: actions/download-artifact@v4
        with:
          name: floating-build
          path: random-floating/Random_FloatingTool/bin/Release/net8.0-windows10.0.19041.0/publish/
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" .github/installer/installer.iss
      - uses: actions/upload-artifact@v4
        with:
          name: setup
          path: dist/
